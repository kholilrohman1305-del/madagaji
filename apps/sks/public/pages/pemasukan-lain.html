<div class="space-y-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Pemasukan Lain</h2>
            <p class="text-sm text-gray-500">Catat pemasukan non-pembayaran siswa agar masuk ke laporan pemasukan.</p>
        </div>
        <div id="other-income-action-wrap" class="flex items-center gap-2">
            <button onclick="openOtherIncomeModal()" class="bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-lg flex items-center gap-2 shadow-sm transition text-sm font-semibold">
                <i class="fas fa-plus-circle"></i>
                <span>Tambah Pemasukan</span>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Total Pemasukan Lain</p>
            <p id="other-income-total-nominal" class="text-2xl font-extrabold text-emerald-600">Rp 0</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Jumlah Transaksi</p>
            <p id="other-income-total-items" class="text-2xl font-extrabold text-slate-700">0</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Periode Filter</p>
            <p id="other-income-period-label" class="text-sm font-bold text-slate-600 mt-1">Semua Tanggal</p>
        </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 items-end">
        <div class="w-full md:w-1/3">
            <label class="text-xs font-semibold text-gray-500 uppercase">Search</label>
            <input id="other-income-search" type="text" placeholder="Cari sumber / deskripsi..." class="mt-1 w-full p-2 border rounded-lg" oninput="renderOtherIncomeTable()">
        </div>
        <div class="w-full md:w-auto">
            <label class="text-xs font-semibold text-gray-500 uppercase">Dari Tanggal</label>
            <input id="other-income-date-from" type="date" class="mt-1 w-full p-2 border rounded-lg" onchange="loadOtherIncomes()">
        </div>
        <div class="w-full md:w-auto">
            <label class="text-xs font-semibold text-gray-500 uppercase">Sampai Tanggal</label>
            <input id="other-income-date-to" type="date" class="mt-1 w-full p-2 border rounded-lg" onchange="loadOtherIncomes()">
        </div>
        <div id="other-income-branch-filter-wrap" class="hidden w-full md:w-auto">
            <label class="text-xs font-semibold text-gray-500 uppercase">Cabang</label>
            <select id="other-income-branch-filter" class="mt-1 w-full p-2 border rounded-lg" onchange="loadOtherIncomes()">
                <option value="">Semua Cabang</option>
            </select>
        </div>
        <button onclick="resetOtherIncomeFilter()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-lg border border-gray-200">
            <i class="fas fa-rotate-left"></i> Reset
        </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm text-left">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
                    <tr>
                        <th class="px-6 py-4">Tanggal</th>
                        <th class="px-6 py-4">Cabang</th>
                        <th class="px-6 py-4">Sumber</th>
                        <th class="px-6 py-4">Deskripsi</th>
                        <th class="px-6 py-4 text-center">Status Laporan</th>
                        <th class="px-6 py-4 text-right">Nominal</th>
                        <th class="px-6 py-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="other-income-table-body" class="divide-y divide-gray-100">
                    <tr><td colspan="7" class="text-center py-8 text-gray-400">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
        <div class="flex flex-col gap-2 border-t border-gray-100 px-4 py-3 md:flex-row md:items-center md:justify-between">
            <p id="other-income-page-info" class="text-xs text-gray-500">Menampilkan 0 - 0 dari 0 data</p>
            <div class="flex items-center gap-2">
                <select id="other-income-rows-per-page" class="rounded-lg border border-gray-200 px-2 py-1.5 text-sm" onchange="changeOtherIncomeRowsPerPage()">
                    <option value="10">10 baris</option>
                    <option value="25">25 baris</option>
                    <option value="50">50 baris</option>
                    <option value="all">All</option>
                </select>
                <button id="btn-prev-other-income" type="button" onclick="prevOtherIncomePage()" class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-chevron-left text-xs"></i>
                </button>
                <button id="btn-next-other-income" type="button" onclick="nextOtherIncomePage()" class="rounded-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-600 hover:bg-gray-50">
                    <i class="fas fa-chevron-right text-xs"></i>
                </button>
            </div>
        </div>
    </div>
</div>

<div id="other-income-modal" class="fixed inset-0 z-50 hidden" role="dialog" aria-modal="true">
    <div class="absolute inset-0 z-0 bg-gray-900/60 backdrop-blur-sm" onclick="closeOtherIncomeModal()"></div>
    <div class="relative z-10 flex min-h-full items-center justify-center p-4">
        <div class="relative z-10 bg-white rounded-2xl shadow-xl w-full max-w-xl overflow-hidden">
            <div class="px-5 py-4 border-b flex items-center justify-between">
                <h3 id="other-income-modal-title" class="text-lg font-bold text-gray-800">Tambah Pemasukan Lain</h3>
                <button onclick="closeOtherIncomeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times text-xl"></i></button>
            </div>
            <form id="other-income-form" class="p-5 space-y-4">
                <input type="hidden" id="other-income-id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-sm font-medium text-gray-700">Tanggal</label>
                        <input id="other-income-tanggal" type="date" class="mt-1 w-full p-2 border rounded-lg" required>
                    </div>
                    <div>
                        <label class="text-sm font-medium text-gray-700">Sumber</label>
                        <input id="other-income-sumber" type="text" class="mt-1 w-full p-2 border rounded-lg" placeholder="Contoh: Donasi / Sewa Aula" required>
                    </div>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700">Deskripsi</label>
                    <input id="other-income-deskripsi" type="text" class="mt-1 w-full p-2 border rounded-lg" placeholder="Keterangan transaksi" required>
                </div>
                <div>
                    <label class="text-sm font-medium text-gray-700">Nominal (Rp)</label>
                    <input id="other-income-nominal" type="number" min="1" class="mt-1 w-full p-2 border rounded-lg" placeholder="0" required>
                </div>
                <div class="flex items-center gap-2">
                    <input id="other-income-active" type="checkbox" class="h-4 w-4" checked>
                    <label for="other-income-active" class="text-sm text-gray-700">Aktif</label>
                </div>
                <div class="pt-3 border-t flex justify-end gap-2">
                    <button type="button" onclick="closeOtherIncomeModal()" class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50">Batal</button>
                    <button type="submit" class="px-4 py-2 rounded-lg bg-emerald-600 hover:bg-emerald-700 text-white font-bold">
                        <i class="fas fa-save mr-1"></i> Simpan
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
