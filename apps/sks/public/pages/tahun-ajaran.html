<div class="space-y-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Data Tahun Ajaran</h2>
            <p class="text-sm text-gray-500">Kelola tahun ajaran dan semester aktif.</p>
        </div>
        <div class="flex items-center gap-2">
            <input id="ta-new-name" type="text" placeholder="Contoh: 2026/2027" class="px-3 py-2 border border-gray-200 rounded-lg text-sm" />
            <button onclick="addTahunAjaran()" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-lg text-sm font-bold">
                <i class="fas fa-plus mr-1"></i> Tambah
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
        <select id="ta-status-filter" class="px-3 py-2 border border-gray-200 rounded-lg text-sm" onchange="renderTahunAjaranTables()">
            <option value="">Semua Status</option>
            <option value="active">Aktif</option>
            <option value="inactive">Nonaktif</option>
        </select>
        <input id="ta-search" type="text" placeholder="Cari Tahun Ajaran" class="px-3 py-2 border border-gray-200 rounded-lg text-sm" onkeyup="renderTahunAjaranTables()" />
    </div>

    <div class="grid grid-cols-1 xl:grid-cols-3 gap-6">
        <div class="xl:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-5 py-4 border-b bg-gray-50/50">
                <h3 class="font-bold text-gray-800">Daftar Tahun Pelajaran</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-6 py-4">No.</th>
                            <th class="px-6 py-4">Tahun Pelajaran</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-tahun-ajaran" class="divide-y divide-gray-100 bg-white"></tbody>
                </table>
            </div>
        </div>

        <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-5 py-4 border-b bg-gray-50/50">
                <h3 class="font-bold text-gray-800">Semester Berjalan</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                        <tr>
                            <th class="px-6 py-4">No.</th>
                            <th class="px-6 py-4">Semester</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4 text-center">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="table-semester-ajaran" class="divide-y divide-gray-100 bg-white"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
