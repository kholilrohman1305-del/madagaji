<div class="space-y-6">
    <div class="rounded-2xl border border-indigo-100 bg-gradient-to-r from-indigo-50 via-white to-blue-50 p-5 shadow-sm">
        <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
                <h2 class="text-2xl font-bold text-slate-800">Backup Database</h2>
                <p class="text-sm text-slate-500">Backup SQL otomatis setiap 8 jam, maksimal 3 file terbaru.</p>
            </div>
            <div class="flex gap-2">
                <button id="btn-backup-refresh" onclick="loadBackupList()" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold text-slate-700 hover:bg-slate-50">
                    <i class="fas fa-rotate mr-1"></i> Refresh
                </button>
                <button id="btn-backup-generate" onclick="generateBackupNow()" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white hover:bg-indigo-700 shadow">
                    <i class="fas fa-plus mr-1"></i> Backup Sekarang
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-3">
        <div class="rounded-xl border border-slate-100 bg-white p-4 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Interval Auto</p>
            <p class="mt-2 text-2xl font-extrabold text-indigo-600" id="backup-interval-hours">8 Jam</p>
        </div>
        <div class="rounded-xl border border-slate-100 bg-white p-4 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Maksimal File</p>
            <p class="mt-2 text-2xl font-extrabold text-slate-800" id="backup-max-files">3 File</p>
        </div>
        <div class="rounded-xl border border-slate-100 bg-white p-4 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wide text-slate-500">Backup Tersedia</p>
            <p class="mt-2 text-2xl font-extrabold text-emerald-600" id="backup-total-files">0</p>
        </div>
    </div>

    <div class="overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full text-sm">
                <thead class="bg-slate-50 text-left text-[11px] font-bold uppercase tracking-wide text-slate-500">
                    <tr>
                        <th class="px-5 py-4">Nama File</th>
                        <th class="px-5 py-4">Ukuran</th>
                        <th class="px-5 py-4">Waktu Update</th>
                        <th class="px-5 py-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="backup-table-body" class="divide-y divide-slate-100">
                    <tr><td colspan="4" class="p-8 text-center text-slate-400">Memuat daftar backup...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
