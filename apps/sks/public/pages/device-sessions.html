<div class="space-y-6">
    <div class="flex flex-col sm:flex-row justify-between items-center gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Manajemen Device Session</h2>
            <p class="text-sm text-gray-500">Lihat perangkat aktif dan paksa logout sesi tertentu.</p>
        </div>
        <button onclick="loadDeviceSessions()" class="px-4 py-2 rounded-lg border border-gray-200 bg-white hover:bg-gray-50 text-sm font-semibold">
            <i class="fas fa-rotate mr-1"></i> Refresh
        </button>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 p-4">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                    <tr>
                        <th class="px-4 py-3 text-left">User</th>
                        <th class="px-4 py-3 text-left">Role</th>
                        <th class="px-4 py-3 text-left">IP</th>
                        <th class="px-4 py-3 text-left">Perangkat</th>
                        <th class="px-4 py-3 text-left">Login</th>
                        <th class="px-4 py-3 text-left">Last Seen</th>
                        <th class="px-4 py-3 text-left">Status</th>
                        <th class="px-4 py-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="device-sessions-table" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</div>
