<div class="max-w-4xl mx-auto space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Pengaturan Sekolah</h2>
            <p class="text-sm text-gray-500">Atur identitas instansi untuk Kop Surat dan Kwitansi.</p>
        </div>
        <button onclick="saveSettings()" id="btn-save-settings" class="bg-primary-600 hover:bg-primary-700 text-white px-6 py-2.5 rounded-lg shadow-lg shadow-primary-200 transition font-bold flex items-center gap-2">
            <i class="fas fa-save"></i> Simpan Perubahan
        </button>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div class="p-6 border-b border-gray-100 bg-gray-50/50">
            <h3 class="font-bold text-gray-800"><i class="fas fa-building mr-2"></i> Identitas Instansi</h3>
        </div>
        
        <form id="form-settings" class="p-8 space-y-6">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nama Sekolah / Instansi <span class="text-red-500">*</span></label>
                    <input type="text" id="set-nama" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition" placeholder="Contoh: SMK MERDEKA 1">
                    <p class="text-xs text-gray-400 mt-1">Akan muncul sebagai judul utama di Kwitansi.</p>
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Nomor Telepon</label>
                    <input type="text" id="set-telepon" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition" placeholder="(021) xxxx-xxxx">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Email Resmi</label>
                    <input type="email" id="set-email" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition" placeholder="admin@sekolah.sch.id">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-2">Website</label>
                    <input type="text" id="set-website" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition" placeholder="www.sekolah.sch.id">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Alamat Lengkap</label>
                <textarea id="set-alamat" rows="2" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition" placeholder="Jalan Raya No..."></textarea>
            </div>

            <hr class="border-gray-100">

            <div>
                <label class="block text-sm font-bold text-gray-700 mb-2">Catatan Kaki Kwitansi</label>
                <input type="text" id="set-footer" class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 outline-none transition" placeholder="Harap simpan bukti ini...">
                <p class="text-xs text-gray-400 mt-1">Teks kecil di bagian bawah kwitansi.</p>
            </div>

        </form>
    </div>
</div>
