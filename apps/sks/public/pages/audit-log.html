<div class="space-y-6">
    <div>
        <h2 class="text-2xl font-bold text-gray-800">Audit Log</h2>
        <p class="text-sm text-gray-500">Rekam jejak login, perubahan data, pembayaran, hapus, dan revisi.</p>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 p-4">
        <div class="grid grid-cols-1 md:grid-cols-6 gap-3 mb-4">
            <input id="audit-user-id" type="number" placeholder="User ID" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
            <input id="audit-role" type="text" placeholder="Role (admin/super_admin/siswa)" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
            <input id="audit-branch-id" type="number" placeholder="Branch ID" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
            <input id="audit-action" type="text" placeholder="Action" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
            <input id="audit-date-from" type="date" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
            <input id="audit-date-to" type="date" class="px-3 py-2 border border-gray-200 rounded-lg text-sm">
        </div>
        <div class="flex justify-end mb-4">
            <button onclick="loadAuditLogs()" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-semibold">
                <i class="fas fa-filter mr-1"></i> Terapkan Filter
            </button>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-bold">
                    <tr>
                        <th class="px-4 py-3 text-left">Waktu</th>
                        <th class="px-4 py-3 text-left">User</th>
                        <th class="px-4 py-3 text-left">Role</th>
                        <th class="px-4 py-3 text-left">Cabang</th>
                        <th class="px-4 py-3 text-left">Action</th>
                        <th class="px-4 py-3 text-left">Path</th>
                        <th class="px-4 py-3 text-left">Status</th>
                    </tr>
                </thead>
                <tbody id="audit-log-table" class="divide-y divide-gray-100"></tbody>
            </table>
        </div>
    </div>
</div>
