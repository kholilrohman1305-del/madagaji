<div class="space-y-6">
    <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-3">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Data Guru</h2>
            <p class="text-sm text-gray-500">Sumber data guru diambil dari PDMADA. Kelola akun login penanggung jawab di sini.</p>
        </div>
        <button type="button" onclick="loadGuruAccounts(true)" class="px-4 py-2.5 rounded-lg border border-gray-200 text-gray-700 hover:bg-gray-50 text-sm font-semibold">
            <i class="fas fa-rotate-right mr-1"></i> Refresh
        </button>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase">Cari Guru</label>
                <input id="guru-search" type="text" class="mt-1 w-full p-2 border rounded-lg" placeholder="Nama / NIY / username..." oninput="renderGuruTable()">
            </div>
            <div>
                <label class="text-xs font-semibold text-gray-500 uppercase">Filter Akun</label>
                <select id="guru-filter-account" class="mt-1 w-full p-2 border rounded-lg" onchange="renderGuruTable()">
                    <option value="all">Semua</option>
                    <option value="yes">Sudah punya akun</option>
                    <option value="no">Belum punya akun</option>
                </select>
            </div>
            <div class="text-sm text-gray-500">
                Password tidak ditampilkan. Gunakan tombol <span class="font-semibold">Reset Password</span> untuk membuat password baru.
            </div>
        </div>
    </div>

    <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-50 text-gray-600 uppercase text-xs font-semibold">
                    <tr>
                        <th class="px-6 py-4 text-left">Nama Guru</th>
                        <th class="px-6 py-4 text-left">NIY</th>
                        <th class="px-6 py-4 text-left">Username</th>
                        <th class="px-6 py-4 text-left">Password</th>
                        <th class="px-6 py-4 text-center">Status Akun</th>
                        <th class="px-6 py-4 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="guru-table-body" class="divide-y divide-gray-100">
                    <tr><td colspan="6" class="px-6 py-10 text-center text-gray-400">Memuat data guru...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
