<div class="space-y-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">All Laporan</h2>
            <p class="text-sm text-gray-500">Ringkasan pemasukan, pengeluaran, dan saldo dengan grafik periode tanggal.</p>
        </div>
    </div>

    <div class="bg-white p-4 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row gap-4 items-end">
        <div class="w-full md:w-auto">
            <label class="text-xs font-semibold text-gray-500 uppercase">Dari Tanggal</label>
            <input id="all-report-date-from" type="date" class="mt-1 w-full p-2 border rounded-lg">
        </div>
        <div class="w-full md:w-auto">
            <label class="text-xs font-semibold text-gray-500 uppercase">Sampai Tanggal</label>
            <input id="all-report-date-to" type="date" class="mt-1 w-full p-2 border rounded-lg">
        </div>
        <div id="all-report-branch-filter-wrap" class="hidden w-full md:w-auto">
            <label class="text-xs font-semibold text-gray-500 uppercase">Cabang</label>
            <select id="all-report-branch-filter" class="mt-1 w-full p-2 border rounded-lg">
                <option value="">Semua Cabang</option>
            </select>
        </div>
        <button onclick="loadAllLaporanData()" class="px-4 py-2 rounded-lg bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold">
            <i class="fas fa-filter mr-1"></i> Terapkan Filter
        </button>
        <button onclick="resetAllLaporanFilter()" class="px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-50 text-sm font-semibold">
            <i class="fas fa-rotate-left mr-1"></i> Reset
        </button>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Pemasukan Daftar Ulang</p>
            <p id="all-report-income-payment" class="text-2xl font-extrabold text-emerald-600">Rp 0</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Pemasukan Lain</p>
            <p id="all-report-income-other" class="text-2xl font-extrabold text-teal-600">Rp 0</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Pengeluaran</p>
            <p id="all-report-expense" class="text-2xl font-extrabold text-rose-600">Rp 0</p>
        </div>
        <div class="bg-white border border-gray-100 rounded-xl p-4 shadow-sm">
            <p class="text-xs text-gray-500 uppercase font-semibold">Saldo</p>
            <p id="all-report-balance" class="text-2xl font-extrabold text-primary-700">Rp 0</p>
        </div>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-bold text-gray-800">Grafik Arus Kas</h3>
            <span class="text-xs text-gray-400">Pemasukan vs Pengeluaran</span>
        </div>
        <div class="h-[340px]">
            <canvas id="all-report-chart"></canvas>
        </div>
    </div>
</div>
