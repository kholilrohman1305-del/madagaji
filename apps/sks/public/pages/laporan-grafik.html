<div class="space-y-6">
    <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Laporan Keuangan (Grafik Batang)</h2>
            <p class="text-sm text-gray-500">Ringkasan pemasukan dan potensi tagihan per bulan.</p>
        </div>
        <div class="inline-flex items-center gap-2 rounded-xl border border-blue-100 bg-blue-50 px-3 py-2 text-xs font-semibold text-blue-700">
            <i class="fas fa-chart-column"></i>
            <span id="laporan-period-badge">Periode -</span>
        </div>
    </div>

    <div class="rounded-2xl border border-gray-100 bg-white p-4 shadow-sm">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-4">
            <div>
                <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Dari Bulan</label>
                <input type="month" id="report-start-month" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-100">
            </div>
            <div>
                <label class="mb-1 block text-xs font-semibold uppercase tracking-wide text-gray-500">Sampai Bulan</label>
                <input type="month" id="report-end-month" class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm outline-none focus:border-primary-400 focus:ring-2 focus:ring-primary-100">
            </div>
            <div class="md:col-span-2 flex items-end gap-2">
                <button onclick="loadLaporanData()" class="inline-flex items-center justify-center gap-2 rounded-lg bg-primary-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-primary-700">
                    <i class="fas fa-rotate"></i>
                    <span>Refresh Grafik</span>
                </button>
                <button onclick="downloadExcel()" class="inline-flex items-center justify-center gap-2 rounded-lg bg-emerald-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-emerald-700">
                    <i class="fas fa-download"></i>
                    <span>Export Data Grafik</span>
                </button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-2">
        <div class="rounded-2xl border border-emerald-100 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Total Pemasukan</p>
            <p id="laporan-total-pemasukan" class="mt-2 text-3xl font-extrabold text-emerald-600">Rp 0</p>
        </div>
        <div class="rounded-2xl border border-rose-100 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Total Potensi Tagihan</p>
            <p id="laporan-total-tagihan" class="mt-2 text-3xl font-extrabold text-rose-600">Rp 0</p>
        </div>
    </div>

    <div class="rounded-2xl border border-gray-100 bg-white p-5 shadow-sm">
        <h3 class="mb-4 text-sm font-bold uppercase tracking-wide text-gray-600">Grafik Batang Bulanan</h3>
        <div class="h-80">
            <canvas id="laporan-chart"></canvas>
        </div>
    </div>
</div>
