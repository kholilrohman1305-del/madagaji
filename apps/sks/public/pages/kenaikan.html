<div class="space-y-6">
    <div class="flex justify-between items-center">
        <div>
            <h2 class="text-2xl font-bold text-gray-800">Kenaikan Kelas & Kelulusan</h2>
            <p class="text-sm text-gray-500">Pindahkan siswa ke tingkat selanjutnya atau set status lulus.</p>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <div class="lg:col-span-1 space-y-6">
            
            <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">1. Pilih Kelas Asal</h3>
                <div class="space-y-3">
                    <label class="block text-sm text-gray-600">Ambil siswa dari kelas:</label>
                    <select id="source-class" class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-primary-500 outline-none" onchange="loadStudentsByClass()">
                        <option value="">-- Pilih Kelas --</option>
                        </select>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl border border-gray-100 shadow-sm">
                <h3 class="font-bold text-gray-800 mb-4 border-b pb-2">2. Pilih Tujuan</h3>
                <form id="form-promote" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Pindahkan ke Kelas:</label>
                        <select id="target-class" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none" required>
                            <option value="">-- Pilih Kelas Tujuan --</option>
                            <option value="ALUMNI" class="font-bold text-red-600">-- SET SEBAGAI ALUMNI --</option>
                            </select>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600 mb-1">Status Siswa:</label>
                        <select id="target-status" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none">
                            <option value="Aktif">Aktif (Naik Kelas)</option>
                            <option value="Lulus">Lulus (Tamat Belajar)</option>
                        </select>
                    </div>

                    <div id="tahun-lulus-group" class="hidden">
                        <label class="block text-sm text-gray-600 mb-1">Tahun Lulus:</label>
                        <input id="target-tahun-lulus" type="number" min="1900" max="2999" class="w-full p-2 border rounded-lg focus:ring-2 focus:ring-primary-500 outline-none" placeholder="Contoh: 2026">
                    </div>

                    <div class="pt-4">
                        <button type="submit" id="btn-promote" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-bold py-3 rounded-lg shadow-lg transition">
                            Proses Pindah / Lulus
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2">
            <div class="bg-white rounded-xl shadow-sm border border-gray-100 h-full flex flex-col">
                <div class="p-5 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800">Daftar Siswa Terpilih <span id="selected-count" class="ml-2 bg-blue-100 text-blue-600 text-xs px-2 py-1 rounded-full">0 Siswa</span></h3>
                    <button onclick="toggleSelectAll()" class="text-sm text-primary-600 hover:underline font-bold">Pilih Semua</button>
                </div>
                
                <div class="flex-1 overflow-y-auto max-h-[600px] p-2">
                    <table class="w-full text-sm text-left">
                        <thead class="bg-white sticky top-0 z-10">
                            <tr class="text-gray-500 border-b">
                                <th class="p-3 w-10 text-center"><input type="checkbox" id="check-all" onclick="toggleSelectAll()"></th>
                                <th class="p-3">Nama Siswa</th>
                                <th class="p-3">NIS</th>
                                <th class="p-3 text-right">Tagihan</th>
                            </tr>
                        </thead>
                        <tbody id="promote-student-list" class="divide-y divide-gray-100">
                            <tr><td colspan="4" class="p-8 text-center text-gray-400 italic">Silakan pilih kelas asal terlebih dahulu.</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>
</div>
