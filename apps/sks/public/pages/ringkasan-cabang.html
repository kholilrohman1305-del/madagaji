<div class="space-y-6">
    <div class="rounded-2xl border border-sky-100 bg-gradient-to-r from-sky-50 via-white to-indigo-50 p-5 md:p-6 shadow-sm">
        <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
            <div>
                <div class="inline-flex items-center gap-2 rounded-full bg-white/80 px-3 py-1 text-xs font-semibold text-indigo-600 ring-1 ring-indigo-100">
                    <i class="fas fa-building"></i>
                    <span>Mode Pusat</span>
                </div>
                <h2 class="mt-3 text-2xl font-extrabold tracking-tight text-slate-800 md:text-3xl">Ringkasan Cabang</h2>
                <p class="mt-1 text-sm text-slate-500">Rekap operasional semua cabang berdasarkan periode bulan dan tahun.</p>
            </div>
        </div>
    </div>

    <div class="rounded-2xl border border-slate-100 bg-white p-4 shadow-sm">
        <div class="grid grid-cols-1 gap-3 md:grid-cols-3">
            <input id="branch-summary-date-from" type="date" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none focus:border-indigo-300 focus:bg-white focus:ring-4 focus:ring-indigo-100">
            <input id="branch-summary-date-to" type="date" class="w-full rounded-xl border border-slate-200 bg-slate-50 px-4 py-2.5 text-sm outline-none focus:border-indigo-300 focus:bg-white focus:ring-4 focus:ring-indigo-100">
            <button id="branch-summary-filter-btn" class="inline-flex items-center justify-center gap-2 rounded-xl bg-indigo-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:bg-indigo-700">
                <i class="fas fa-filter text-xs"></i>
                <span>Terapkan Filter</span>
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 gap-4 md:grid-cols-4">
        <div class="rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Cabang</p>
            <p id="branch-summary-total-cabang" class="mt-2 text-3xl font-extrabold text-slate-800">0</p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Siswa Aktif</p>
            <p id="branch-summary-total-siswa" class="mt-2 text-3xl font-extrabold text-slate-800">0</p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Pemasukan</p>
            <p id="branch-summary-total-pemasukan" class="mt-2 text-2xl font-extrabold text-emerald-600">Rp 0</p>
        </div>
        <div class="rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
            <p class="text-xs font-semibold uppercase tracking-wider text-slate-500">Total Tagihan</p>
            <p id="branch-summary-total-tagihan" class="mt-2 text-2xl font-extrabold text-rose-600">Rp 0</p>
        </div>
    </div>

    <div class="rounded-2xl border border-slate-100 bg-white p-5 shadow-sm">
        <div class="mb-3 flex items-center justify-between">
            <h3 class="text-sm font-bold uppercase tracking-wider text-slate-500">Grafik Pemasukan per Cabang</h3>
            <span id="branch-summary-period-label" class="rounded-lg bg-slate-50 px-2 py-1 text-xs font-semibold text-slate-500">-</span>
        </div>
        <div class="h-80 w-full">
            <canvas id="branchSummaryChart"></canvas>
        </div>
    </div>

    <div class="overflow-hidden rounded-2xl border border-slate-100 bg-white shadow-sm">
        <div class="overflow-x-auto">
            <table class="min-w-full text-left text-sm">
                <thead class="bg-slate-50 text-[11px] font-bold uppercase tracking-wider text-slate-500">
                    <tr>
                        <th class="px-6 py-4">Cabang</th>
                        <th class="px-6 py-4">Siswa Aktif</th>
                        <th class="px-6 py-4">Transaksi</th>
                        <th class="px-6 py-4 text-right">Pemasukan</th>
                        <th class="px-6 py-4 text-right">Tagihan</th>
                        <th class="px-6 py-4 text-center">Status</th>
                    </tr>
                </thead>
                <tbody id="branch-summary-table" class="divide-y divide-slate-100 bg-white">
                    <tr><td colspan="6" class="p-10 text-center text-slate-400">Memuat data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
