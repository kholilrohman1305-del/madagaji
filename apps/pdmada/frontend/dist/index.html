<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Master Data Madrasah</title>
    <script type="module" crossorigin src="/pdmada/assets/index-BR7ivwBa.js"></script>
    <link rel="stylesheet" crossorigin href="/pdmada/assets/index-Cb2Hnxeo.css">
  </head>
  <body>
    <div id="root">
      Memuat PDMADA...
    </div>
    <script>
      (function () {
        var root = document.getElementById('root');
        function show(message) {
          if (!root) return;
          root.innerHTML =
            '<div style="padding:24px;font-family:Poppins,sans-serif">' +
            '<h3 style="margin:0 0 8px;color:#b91c1c">PDMADA gagal dimuat</h3>' +
            '<div style="color:#334155">' + String(message || 'Unknown error') + '</div>' +
            '</div>';
        }
        window.addEventListener('error', function (event) {
          show((event && (event.message || (event.error && event.error.message))) || 'Runtime error');
        });
        window.addEventListener('unhandledrejection', function (event) {
          var reason = event && event.reason;
          show((reason && reason.message) || reason || 'Unhandled promise rejection');
        });
      })();
    </script>
  </body>
</html>
